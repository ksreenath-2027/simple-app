name: Build, Push and Update Helm

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'helm/**'
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set Image Tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/simple-app:${TAG} .
      
      - name: Scan image with trivy
        uses: aquasecurity/trivy-action@v0.20.0
        with: 
          image-ref : ${{secrets.DOCKER_USERNAME}}/simple-app:${env.TAG}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL, HIGH

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/simple-app:${TAG}

      - name: Update Helm values.yaml
        run: |
          sed -i "s/tag:.*/tag: ${TAG}/" charts/values.yaml

      - name: Commit and Push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add charts/values.yaml
          git commit -m "Update image tag to ${TAG}"
          git push