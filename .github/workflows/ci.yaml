name: Build and Promote Dev

on:
  push:
    branches: [main]
    paths-ignore:
      - 'charts/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  dev:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set Tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login Docker
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/simple-app:${TAG} .
          docker push ${{ secrets.DOCKER_USERNAME }}/simple-app:${TAG}

      - name: Install yq
        run: | 
        sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
        sudo chmod +x /usr/bin/yq

      - name: Update DEV values
        run: |
          yq e -i '.image.tag = strenv(TAG)' charts/values-dev.yaml

      - name: Create DEV PR
        id: cpr
        uses: peter-evans/create-pull-request@v5
        with:
          branch: dev-${{ env.TAG }}
          title: "DEV: ${TAG}"
          base: main
          commit-message: "DEV: update image ${TAG}"
          add-paths: charts/values-dev.yaml

      - name: Auto Merge DEV PR
        if: steps.cpr.outputs.pull-request-number != ''
        run: |
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --auto --merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}        